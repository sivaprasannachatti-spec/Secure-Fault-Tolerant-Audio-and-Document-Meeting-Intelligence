<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - Meeting AI</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="logo">MeetingAI</a>
        <div class="nav-links">
            <a href="login.html" class="btn-outline">Already a user?</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="glass-card">
            <h1 class="auth-title">Create an account</h1>
            <p class="auth-subtitle">Join your team's workspace and streamline your meetings.</p>
            
            <div id="error-message" class="error-text"></div>
            <div id="success-message" class="success-text"></div>
            
            <form id="signup-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                </div>
                
                <div class="form-group">
                    <label for="dept">Department ID</label>
                    <input type="number" id="dept" class="form-control" placeholder="e.g. 101" required>
                </div>

                <div class="form-group">
                    <label for="team_id">Team ID</label>
                    <input type="number" id="team_id" class="form-control" placeholder="e.g. 5001" required>
                </div>
                
                <button type="submit" class="btn-primary btn-block">Sign Up</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
