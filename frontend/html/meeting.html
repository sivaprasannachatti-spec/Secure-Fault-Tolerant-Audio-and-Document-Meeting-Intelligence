<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Meeting - Meeting AI</title>
    <link rel="stylesheet" href="../css/style.css">
    <script>
        // Redirect if not logged in
        if (localStorage.getItem('isAuthenticated') !== 'true') {
            window.location.replace('login.html');
        }
    </script>
</head>
<body>
    <nav class="navbar">
        <a href="chat.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                <polyline points="2 17 12 22 22 17"></polyline>
                <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
            MeetingAI Workspace
        </a>
        <div class="nav-links">
            <a href="chat.html" class="btn-outline">Back to Chat</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="glass-card" style="max-width: 500px;">
            <h1 class="auth-title">Upload Meeting</h1>
            <p class="auth-subtitle">Upload the raw audio to generate minutes and action items for your department.</p>
            
            <div id="status-message" class="error-text" style="color: var(--text-primary); text-align: center; margin-bottom: 1rem;"></div>
            
            <form id="upload-form">
                <div class="form-group">
                    <label style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 0.5rem; display: block;">Who should see this?</label>
                    <div style="display: flex; flex-direction: column; gap: 0.8rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 1.5rem;">
                        <label style="color: white; font-size: 0.9rem; display: flex; align-items: center; gap: 0.6rem; cursor: pointer;">
                            <input type="radio" name="is_department_wide" value="false" checked style="accent-color: #a855f7;"> Just My Team (Private)
                        </label>
                        <label style="color: var(--text-secondary); font-size: 0.9rem; display: flex; align-items: center; gap: 0.6rem; cursor: pointer;">
                            <input type="radio" name="is_department_wide" value="true" style="accent-color: #a855f7;"> Entire Department (Public)
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="audio-file">Meeting Audio File</label>
                    <input type="file" id="audio-file" class="form-control" accept="audio/*" required style="padding: 0.7rem; background: rgba(255, 255, 255, 0.05);">
                </div>
                
                <button type="submit" class="btn-primary btn-block" id="upload-btn">
                    <span id="btn-text">Generate Meeting Minutes</span>
                </button>
            </form>
            
            <div class="auth-footer" style="margin-top: 1.5rem; font-size: 0.8rem;">
                <span id="loading-indicator" style="display: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 2s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                    Processing via LangGraph AI Pipeline... this may take a few minutes.
                </span>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #loading-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-primary);
        }
    </style>

    <script src="../js/meeting.js"></script>
</body>
</html>
