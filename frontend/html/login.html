<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - Meeting AI</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="logo">MeetingAI</a>
        <div class="nav-links">
            <a href="signup.html" class="btn-outline">Need an account?</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="glass-card">
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Enter your credentials to access your workspace.</p>
            
            <div id="error-message" class="error-text"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                </div>
                
                <div class="form-group">
                    <label for="dept">Department ID</label>
                    <input type="number" id="dept" class="form-control" placeholder="e.g. 101" required>
                </div>
                
                <button type="submit" class="btn-primary btn-block">Log In</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign up</a>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
